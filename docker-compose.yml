services:

  postgres:
    image: postgres:15

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  mysql_db:
    image: mysql:8.0

    container_name: mysql_db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce_data

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:

    image: apache/airflow:2.10.0

    depends_on:
      postgres:
        condition: service_healthy

      mysql_db:
        condition: service_healthy

    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

      AIRFLOW_UID: 50000

      AIRFLOW_CONN_MYSQL_ECOMMERCE_DATA: mysql://root:root123@mysql_db:3306/ecommerce_data

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      "

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./etl_scripts:/opt/airflow/etl_scripts
      - ./data:/opt/airflow/data

  airflow-webserver:

    image: apache/airflow:2.10.0

    container_name: airflow_webserver

    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

      AIRFLOW_CONN_MYSQL_ECOMMERCE_DATA: mysql://root:root123@mysql_db:3306/ecommerce_data

    command: webserver

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./etl_scripts:/opt/airflow/etl_scripts
      - ./data:/opt/airflow/data

  airflow-scheduler:

    image: apache/airflow:2.10.0

    container_name: airflow_scheduler

    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

      AIRFLOW_CONN_MYSQL_ECOMMERCE_DATA: mysql://root:root123@mysql_db:3306/ecommerce_data

    command: scheduler

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./etl_scripts:/opt/airflow/etl_scripts
      - ./data:/opt/airflow/data

volumes:
  mysql_data:
  postgres-db-volume: